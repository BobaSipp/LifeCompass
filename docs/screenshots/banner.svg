<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Grid pattern background -->
  <g opacity="0.05" stroke="white" stroke-width="0.5">
    <line x1="0" y1="50" x2="1200" y2="50"/><line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/><line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/><line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/><line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="60" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.3"/>
  <circle cx="100" cy="80" r="40" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.2"/>
  <circle cx="1100" cy="320" r="80" fill="none" stroke="#ff6b35" stroke-width="0.5" opacity="0.3"/>
  <circle cx="1100" cy="320" r="50" fill="none" stroke="#ff6b35" stroke-width="0.5" opacity="0.2"/>

  <!-- Chart line decoration -->
  <polyline points="50,350 150,300 300,320 400,250 550,280 650,180 800,220 950,120 1100,160 1150,100"
    fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.6" filter="url(#glow)"/>

  <!-- Dot markers on chart -->
  <circle cx="150" cy="300" r="4" fill="#e94560" opacity="0.8"/>
  <circle cx="400" cy="250" r="4" fill="#e94560" opacity="0.8"/>
  <circle cx="650" cy="180" r="4" fill="#e94560" opacity="0.8"/>
  <circle cx="950" cy="120" r="4" fill="#e94560" opacity="0.8"/>
  <circle cx="1150" cy="100" r="5" fill="#ff6b35" opacity="0.9"/>

  <!-- Life in Weeks inspired grid -->
  <g transform="translate(850, 40)" opacity="0.4">
    <rect x="0" y="0" width="12" height="12" rx="1" fill="#4ecca3"/>
    <rect x="14" y="0" width="12" height="12" rx="1" fill="#4ecca3"/>
    <rect x="28" y="0" width="12" height="12" rx="1" fill="#4ecca3"/>
    <rect x="0" y="14" width="12" height="12" rx="1" fill="#4ecca3"/>
    <rect x="14" y="14" width="12" height="12" rx="1" fill="#e94560"/>
    <rect x="28" y="14" width="12" height="12" rx="1" fill="#e94560"/>
    <rect x="42" y="0" width="12" height="12" rx="1" fill="#ff6b35"/>
    <rect x="42" y="14" width="12" height="12" rx="1" fill="#e94560"/>
  </g>

  <!-- Title -->
  <text x="600" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold"
    fill="white" text-anchor="middle" letter-spacing="4">LifeLedger</text>

  <!-- Tagline -->
  <text x="600" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="300"
    fill="#a0a0b0" text-anchor="middle" letter-spacing="8">LIFE COMPASS</text>

  <!-- Subtitle -->
  <text x="600" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-style="italic"
    fill="#888" text-anchor="middle">Every part of life, compounding.</text>

  <!-- Accent line -->
  <rect x="530" y="280" width="140" height="3" rx="2" fill="url(#accent)"/>

  <!-- Bottom info -->
  <text x="600" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#666" text-anchor="middle">
    Daily habits · Finances · Trading · Fitness · Mental health · Relationships · Books
  </text>
</svg>
